<!--商品カードを8枚以上並べる
各カードには「画像（絵文字でよい）」「商品名」「価格」を含める
グリッドで並べる（スマホで1〜2列、PCで4列程度）
hover: を使って、マウスを乗せたときにカードの見た目が変わるエフェクトを付ける
ページ全体のレイアウト（ヘッダーや余白など）も整える
ホバー時のエフェクトを自分で選ぶこと（shadow-lg・scale-105・bg変化など--!>
